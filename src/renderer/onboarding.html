<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; img-src 'self' file:; style-src 'unsafe-inline'; script-src 'unsafe-inline'"
    />
    <style>
      :root {
        --bg: #16171b; --card: #1e2026; --line: #2c2f38;
        --text: #e8e9ec; --muted: #9aa0ac;
        --accent: #10a37f; --accent-hi: #14c493;
        --claude: #d97757;
        --danger: #e5533a;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; background: var(--bg); color: var(--text);
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        display: flex; flex-direction: column; height: 100vh;
      }
      .titlebar {
        height: 36px; flex: 0 0 auto; display: flex; align-items: center; justify-content: space-between;
        padding: 0 8px 0 12px; background: #101216; border-bottom: 1px solid var(--line);
        -webkit-app-region: drag; user-select: none;
      }
      .tb-title { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; color: var(--muted); }
      .tb-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); }
      .tb-close {
        -webkit-app-region: no-drag; width: 30px; height: 24px; padding: 0;
        border: none; background: transparent; color: var(--muted);
        font-size: 13px; border-radius: 6px; cursor: pointer; line-height: 1;
      }
      .tb-close:hover { background: var(--danger); color: #fff; }

      .stage { flex: 1 1 auto; overflow-y: auto; padding: 26px 34px 10px; }
      h1 { margin: 0 0 8px; font-size: 22px; font-weight: 800; letter-spacing: -.2px; }
      .lead { margin: 0 0 18px; font-size: 13px; line-height: 1.65; color: var(--muted); }
      .lead b { color: var(--text); font-weight: 700; }

      .points { display: grid; gap: 10px; margin: 0 0 4px; }
      .point {
        display: grid; grid-template-columns: 26px 1fr; gap: 10px; align-items: start;
        background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px;
      }
      .point .n {
        width: 22px; height: 22px; border-radius: 50%; background: #2a2d36; color: var(--accent-hi);
        font-size: 11px; font-weight: 800; display: flex; align-items: center; justify-content: center;
      }
      .point .t { display: block; font-size: 13px; font-weight: 700; margin-bottom: 3px; }
      .point .d { display: block; font-size: 12px; line-height: 1.6; color: var(--muted); }
      .point code {
        background: #101216; border: 1px solid var(--line); border-radius: 4px;
        padding: 1px 5px; font-size: 11px; color: #cfd3da;
      }

      .opt {
        display: flex; align-items: flex-start; gap: 12px;
        background: var(--card); border: 1px solid var(--line); border-radius: 10px;
        padding: 12px 14px; margin-bottom: 10px; cursor: pointer;
      }
      .opt:hover { border-color: #3a3f4c; }
      .opt input { margin: 2px 0 0; width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
      .opt .t { display: block; font-size: 13px; font-weight: 700; }
      .opt .d { display: block; font-size: 12px; line-height: 1.55; color: var(--muted); margin-top: 3px; }
      .opt .tag {
        display: inline-block; margin-left: 6px; padding: 2px 6px; border-radius: 999px;
        font-size: 10px; font-weight: 800; background: #2a2d36; color: var(--muted);
      }
      .opt .tag.codex { background: #173f35; color: #b7ead8; }
      .opt .tag.claude { background: #3a241c; color: #f0c0a8; }

      .field { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
      .field label { font-size: 12px; color: var(--muted); min-width: 76px; }
      select {
        background: var(--card); color: var(--text); border: 1px solid var(--line);
        border-radius: 8px; padding: 7px 10px; font-size: 12px; font-family: inherit;
      }

      .done { text-align: center; padding: 26px 0 10px; }
      .done .mark {
        width: 56px; height: 56px; margin: 0 auto 16px; border-radius: 50%;
        background: #173f35; border: 1px solid #2a8d70; color: var(--accent-hi);
        display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: 800;
      }
      .done h1 { font-size: 21px; }
      .done .lead { max-width: 420px; margin: 0 auto; }

      .usage-widget-image {
        display: block; width: auto; max-width: 100%; max-height: 300px;
        margin: 8px auto 0; border: 1px solid var(--line); border-radius: 10px;
      }
      .usage-widget-shots {
        display: grid; grid-template-columns: minmax(0, 220px) minmax(0, 1fr);
        gap: 18px; margin-top: 8px;
      }
      .usage-widget-shot { display: flex; flex-direction: column; align-items: center; gap: 6px; min-width: 0; }
      .usage-widget-settings { min-width: 0; }
      .usage-widget-settings .usage-widget-shot { width: 100%; }
      .usage-widget-settings .usage-widget-controls { margin-top: 10px; }
      .usage-widget-settings .opt > span { min-width: 0; }
      .usage-widget-settings .field { align-items: flex-start; }
      .usage-widget-settings .field label { flex: 0 0 76px; }
      .usage-widget-settings .field select { min-width: 0; flex: 1 1 auto; }
      .usage-widget-shot img {
        display: block; max-width: 100%; max-height: 280px;
        border: 1px solid var(--line); border-radius: 10px;
      }
      .usage-widget-shot .cap { font-size: 11px; color: var(--muted); }

      .foot {
        flex: 0 0 auto; display: flex; align-items: center; justify-content: space-between;
        gap: 10px; padding: 12px 20px 16px; border-top: 1px solid var(--line); background: #101216;
      }
      .dots { display: flex; gap: 6px; }
      .dot { width: 7px; height: 7px; border-radius: 50%; background: #2c2f38; }
      .dot.on { background: var(--accent); }
      .btns { display: flex; gap: 8px; }
      button {
        border: 1px solid var(--line); background: var(--card); color: var(--text);
        border-radius: 8px; padding: 8px 14px; font-size: 12px; font-weight: 600;
        cursor: pointer; white-space: nowrap;
      }
      button:hover { background: #2a2d36; border-color: #3a3f4c; }
      button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
      button.primary:hover { background: var(--accent-hi); border-color: var(--accent-hi); }
      button.ghost { background: transparent; color: var(--muted); border-color: transparent; }
      button.ghost:hover { background: #2a2d36; color: var(--text); }
      button:disabled { opacity: .45; cursor: default; }
    </style>
  </head>
  <body>

      <button class="tb-close" id="close">✕</button>

    <div class="stage" id="stage"></div>

    <div class="foot">
      <div class="dots" id="dots"></div>
      <div class="btns">
        <button class="ghost" id="skip"></button>
        <button id="back"></button>
        <button class="primary" id="next"></button>
      </div>
    </div>

          s.innerHTML = `
            <h1>${M.s2t}</h1>
            <p class="lead">${M.s2l}</p>
            ${optionRow("codexCli", cfg.codex.autoRestartCli, M.optCodexCli, M.optCodexCliD, "codex")}
            ${optionRow("claudeCli", cfg.claude.autoRestartCli, M.optClaudeCli, M.optClaudeCliD, "claude")}
            <p class="lead" style="margin-top:14px">${M.s2note}</p>`;
          $("codexCli").onchange = (e) => (cfg.codex.autoRestartCli = e.target.checked);
          $("claudeCli").onchange = (e) => (cfg.claude.autoRestartCli = e.target.checked);
        } else if (step === 2) {
          const langs = [["", M.langSystem], ["ko", "한국어"], ["en", "English"], ["ja", "日本語"], ["zh", "中文"]];
          s.innerHTML = `
            <h1>${M.s3t}</h1>
            <p class="lead">${M.s3l}</p>
            ${optionRow("desktop", cfg.codex.autoApprove, M.optDesktop, M.optDesktopD, "codex")}
            ${optionRow("login", cfg.launchAtLogin, M.optLogin, M.optLoginD, null)}
            <div class="field">
              <label for="lang">${M.lang}</label>
              <select id="lang">
                ${langs.map(([v, t]) => `<option value="${v}" ${cfg.language === v ? "selected" : ""}>${t}</option>`).join("")}
              </select>
            </div>`;
          $("desktop").onchange = (e) => (cfg.codex.autoApprove = e.target.checked);
          $("login").onchange = (e) => (cfg.launchAtLogin = e.target.checked);
          $("lang").onchange = async (e) => {
            cfg.language = e.target.value;
            await window.rotator.setConfig({ language: cfg.language });
            M = STR[await window.rotator.getLang()] || STR.en;
            render();
          };
        } else if (step === 3) {
          s.innerHTML = `
            <h1>${M.s4t}</h1>
            <p class="lead">${M.s4l}</p>
            <div class="usage-widget-shots">
              <div class="usage-widget-shot">
                <img src="assets/usage-widget.png" alt="${M.s4t}" />
                <span class="cap">${M.s4capFull}</span>
              </div>
              <div class="usage-widget-settings">
                <div class="usage-widget-shot">
                  <img src="assets/usage-widget-compact.png" alt="${M.s4capMin}" />
                  <span class="cap">${M.s4capMin}</span>
                </div>
                <div class="usage-widget-controls">
                  ${optionRow("widgetEnabled", cfg.usageWidget.enabled, M.optWidget, M.optWidgetD, null)}
                  ${optionRow("widgetAlwaysOnTop", cfg.usageWidget.alwaysOnTop, M.optWidgetTop, M.optWidgetTopD, null)}
                  <div class="field">
                    <label for="widgetCompactPosition">${M.optWidgetPos}</label>
                    <select id="widgetCompactPosition">
                      <option value="taskbar" ${cfg.usageWidget.compactPosition === "taskbar" ? "selected" : ""}>${M.posTaskbar}</option>
                      <option value="bottom-right" ${cfg.usageWidget.compactPosition === "bottom-right" ? "selected" : ""}>${M.posBottomRight}</option>
                      <option value="bottom-left" ${cfg.usageWidget.compactPosition === "bottom-left" ? "selected" : ""}>${M.posBottomLeft}</option>
                    </select>
                  </div>
                </div>
              </div>
            </div>`;
          $("widgetEnabled").onchange = (e) => (cfg.usageWidget.enabled = e.target.checked);
          $("widgetAlwaysOnTop").onchange = (e) => (cfg.usageWidget.alwaysOnTop = e.target.checked);
          $("widgetCompactPosition").onchange = (e) => (cfg.usageWidget.compactPosition = e.target.value);
        } else {
          s.innerHTML = `
            <div class="done">
              <div class="mark">✓</div>
              <h1>${M.s5t}</h1>
              <p class="lead">${M.s5l}</p>
            </div>`;
        }

        $("dots").innerHTML = Array.from(
          { length: STEPS },
          (_, i) => `<span class="dot ${i === step ? "on" : ""}"></span>`
        ).join("");
        $("skip").textContent = M.skip;
        $("back").textContent = M.back;
        $("next").textContent = step === STEPS - 1 ? M.finish : M.next;
        $("back").disabled = step === 0;
        // On the closing step, skip sits between "back" and "add an account".
        const last = step === STEPS - 1;
        $("skip").style.order = last ? "2" : "1";
        $("back").style.order = last ? "1" : "2";
        $("next").style.order = "3";
      }

      async function save() {
        await window.rotator.setConfig({
          language: cfg.language,
          launchAtLogin: cfg.launchAtLogin,
          codex: { autoRestartCli: cfg.codex.autoRestartCli, autoApprove: cfg.codex.autoApprove },
          claude: { autoRestartCli: cfg.claude.autoRestartCli },
          usageWidget: {
            enabled: cfg.usageWidget.enabled,
            alwaysOnTop: cfg.usageWidget.alwaysOnTop,
            compactPosition: cfg.usageWidget.compactPosition,
          },
        });
      }

      async function finish(openAccounts) {
        await save();
        await window.rotator.finishOnboarding(openAccounts);
      }

      $("next").onclick = async () => {
        if (step < STEPS - 1) {
          await save();
          step += 1;
          render();
          return;
        }
        await finish(true);
      };
      $("back").onclick = () => {
        if (step > 0) step -= 1;
        render();
      };
      $("skip").onclick = () => finish(false);
      $("close").onclick = () => finish(false);

      (async () => {
        cfg = await window.rotator.getConfig();
        M = STR[await window.rotator.getLang()] || STR.en;
        render();
      })();
    </script>
  </body>
</html>
