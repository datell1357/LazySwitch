<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'"
    />
    <style>
      :root {
        --bg: #16171b; --card: #1e2026; --line: #2c2f38;
        --text: #e8e9ec; --muted: #9aa0ac;
        --accent: #10a37f; --accent-hi: #14c493;
        --claude: #d97757;
        --warn: #e5a13a; --danger: #e5533a;
        --gauge-green: #3ecf6a; --gauge-amber: #e8b13f; --gauge-red: #e5534b;
        --active-ring: #c66a3d;
      }
      * { box-sizing: border-box; }
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: #101216; }
      ::-webkit-scrollbar-thumb { background: #2c2f38; border-radius: 6px; border: 2px solid #101216; }
      ::-webkit-scrollbar-thumb:hover { background: #3a3f4c; }
      body {
        margin: 0; background: var(--bg); color: var(--text);
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      .titlebar {
        height: 36px; display: flex; align-items: center; justify-content: space-between;
        padding: 0 8px 0 12px; background: #101216; border-bottom: 1px solid var(--line);
        -webkit-app-region: drag; user-select: none;
      }
      .tb-title { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; color: var(--muted); }
      .tb-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); }
      .tb-close {
        -webkit-app-region: no-drag; width: 30px; height: 24px; padding: 0;
        border: none; background: transparent; color: var(--muted);
        font-size: 13px; border-radius: 6px; cursor: pointer; line-height: 1;
      }
      .tb-close:hover { background: var(--danger); color: #fff; }
      .body { padding: 14px 18px 16px; }

      .add { display: flex; gap: 8px; margin-bottom: 14px; }
      button {
        border: 1px solid var(--line); background: var(--card); color: var(--text);
        border-radius: 8px; padding: 8px 12px; font-size: 12px; font-weight: 600;
        cursor: pointer; white-space: nowrap;
      }
      button:hover { background: #2a2d36; border-color: #3a3f4c; }
      button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
      button.primary:hover { background: var(--accent-hi); border-color: var(--accent-hi); }
      button.claude { background: var(--claude); border-color: var(--claude); color: #fff; }
      button.claude:hover { filter: brightness(1.1); }
      button.ghost { background: transparent; color: var(--muted); }
      button.ghost:hover { background: #2a2d36; color: var(--text); }
      button:disabled { opacity: .5; cursor: default; }

      .cols { display: grid; gap: 16px; align-items: flex-start; }
      .col { min-width: 0; }
      .colhead {
        display: flex; align-items: baseline; gap: 8px; justify-content: space-between;
        margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--line);
      }
      .section-title { font-size: 13px; font-weight: 800; letter-spacing: .4px; }
      .section-summary { font-size: 12px; color: var(--muted); }
      .list {
        display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 12px; align-items: stretch;
      }

      .acct {
        height: 100%; display: flex; flex-direction: column;
        background: linear-gradient(180deg, #202329, #1a1d22);
        border: 1px solid var(--line); border-radius: 12px;
        padding: 13px 15px 12px; box-shadow: 0 10px 20px #08090c33;
      }
      .acct.active {
        border-color: var(--active-ring);
        box-shadow: 0 0 0 1px #c66a3d88 inset, 0 0 28px #c66a3d1c;
        background: linear-gradient(180deg, #251f1b, #1b1d21);
      }
      .acct-head { min-width: 0; }
      .name-row { display: flex; align-items: center; gap: 8px; min-width: 0; }
      .acct-name {
        min-width: 0; font-size: 15px; line-height: 1.2; font-weight: 800;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .acct-email {
        margin-top: 3px; font-size: 11px; color: var(--muted);
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .plan-badge, .active-badge {
        flex-shrink: 0; border-radius: 999px; padding: 3px 8px;
        font-size: 10px; line-height: 1; font-weight: 800;
      }
      .plan-badge { background: #4c4a3e; color: #f2edd7; border: 1px solid #6a6653; }
      .active-badge { background: #d97757; color: #2a130b; border: 1px solid #f0a27c; }

      .usage-stack { margin-top: 12px; display: grid; gap: 9px; }
      .usage-row-head {
        display: flex; align-items: baseline; justify-content: space-between;
        gap: 12px; margin-bottom: 4px;
      }
      .usage-label { font-size: 12px; font-weight: 650; color: #c7cbd2; }
      .usage-pct { font-size: 12px; font-weight: 800; white-space: nowrap; }
      .usage-row[data-tone="green"] .usage-pct { color: var(--gauge-green); }
      .usage-row[data-tone="amber"] .usage-pct { color: var(--gauge-amber); }
      .usage-row[data-tone="red"] .usage-pct { color: var(--gauge-red); }
      .gauge { height: 8px; background: #252934; border-radius: 999px; overflow: hidden; }
      .gauge-fill { display: block; height: 100%; border-radius: 999px; transition: width .25s ease; }
      .usage-row[data-tone="green"] .gauge-fill { background: var(--gauge-green); }
      .usage-row[data-tone="amber"] .gauge-fill { background: var(--gauge-amber); }
      .usage-row[data-tone="red"] .gauge-fill { background: var(--gauge-red); }
      .usage-reset { min-height: 13px; margin-top: 3px; font-size: 11px; color: #6f7682; }

      .usage-none { font-size: 12px; color: #6b7280; margin-top: 10px; }

      .row-actions {
        display: flex; gap: 8px; margin-top: auto; padding-top: 10px;
        flex-wrap: wrap; align-items: center;
      }
      .switch-btn { background: transparent; color: var(--text); border-color: #3a3f4c; }
      .switch-btn:hover { background: #272b34; border-color: #535968; }
      .mini-actions { display: flex; gap: 6px; margin-left: auto; }
      .mini-actions button {
        padding: 6px 8px; font-size: 11px; background: transparent;
        color: var(--muted); border-color: #2f3440;
      }
      .empty { color: var(--muted); font-size: 12px; text-align: center; padding: 24px 0; }
      .msg { font-size: 11px; color: var(--warn); min-height: 14px; margin-top: 2px; margin-bottom: 8px; }

      /* options panel */
      #optPanel {
        display: none; background: #1e2026; border: 1px solid #2c2f38;
        border-radius: 12px; padding: 12px 14px; margin-bottom: 14px;
      }
      .opt-section {
        font-size: 11px; font-weight: 700; color: var(--muted);
        letter-spacing: .4px; margin: 12px 0 8px; padding-top: 10px;
        border-top: 1px solid var(--line);
      }
      .opt-section:first-child { margin-top: 0; padding-top: 0; border-top: none; }
      .opt-row { display: flex; align-items: center; gap: 8px; font-size: 12px; margin-bottom: 9px; }
      .opt-row:last-child { margin-bottom: 0; }
      .opt-row span.lbl { flex: 1; }
      .opt-row input[type="number"], .opt-row select {
        background: #16171b; border: 1px solid #2c2f38; color: #e8e9ec;
        border-radius: 8px; padding: 6px 8px; font-size: 12px;
      }
      .opt-row input[type="number"] { width: 70px; }
      label.opt-row { cursor: pointer; }
    </style>
  </head>
  <body>
    <div class="titlebar">
      <div class="tb-title"><span class="tb-dot"></span><span id="tbTitle">Accounts</span></div>
      <button class="tb-close" id="tbClose" aria-label="Close">&#x2715;</button>
    </div>

    <div class="body">
    <div class="add">
      <button class="primary" id="addCodex" style="flex:1;">+ Add Codex account</button>
      <button id="optBtn">Options</button>
      <button class="claude" id="addClaude" style="flex:1;">+ Add Claude account</button>
    </div>

    <div id="optPanel">
      <div class="opt-section" id="optSecCommon">General</div>
      <div class="opt-row">
        <span class="lbl" id="optLangLabel">Language</span>
        <select id="optLang">
          <option value="">System</option>
          <option value="ko">한국어</option>
          <option value="en">English</option>
          <option value="ja">日本語</option>
          <option value="zh">中文</option>
        </select>
      </div>
      <label class="opt-row">
        <input type="checkbox" id="optLoginStart" />
        <span id="optLoginStartLabel">Start at login</span>
      </label>

      <div class="opt-section">Codex</div>
      <label class="opt-row">
        <input type="checkbox" id="optAuto" />
        <span id="optAutoLabel">Auto-restart Codex Desktop on account switch</span>
      </label>
      <label class="opt-row">
        <input type="checkbox" id="optCliCodex" />
        <span id="optCliCodexLabel">Auto-restart running Codex CLI sessions after switch</span>
      </label>
      <div class="opt-row">
        <span class="lbl" data-l="optPrim">5h switch threshold (% left)</span>
        <input type="number" data-opt="primaryMinLeftPct" data-p="codex" min="0" max="50" />
      </div>
      <div class="opt-row">
        <span class="lbl" data-l="optSec">Weekly switch threshold (% left)</span>
        <input type="number" data-opt="weeklyMinLeftPct" data-p="codex" min="0" max="50" />
      </div>
      <div class="opt-row">
        <span class="lbl" data-l="optPoll">Threshold check interval (sec)</span>
        <input type="number" data-opt="pollIntervalSec" data-p="codex" min="10" max="3600" />
      </div>
      <div class="opt-row">
        <button data-testcli="codex" data-l="optTestCli">Test CLI restart (no account change)</button>
      </div>

      <div class="opt-section">Claude</div>
      <label class="opt-row">
        <input type="checkbox" id="optCliClaude" />
        <span id="optCliClaudeLabel">Auto-restart running Claude Code sessions after switch</span>
      </label>
      <div class="opt-row">
        <span class="lbl" data-l="optPrim">5h switch threshold (% left)</span>
        <input type="number" data-opt="primaryMinLeftPct" data-p="claude" min="0" max="50" />
      </div>
      <div class="opt-row">
        <span class="lbl" data-l="optSec">Weekly switch threshold (% left)</span>
        <input type="number" data-opt="weeklyMinLeftPct" data-p="claude" min="0" max="50" />
      </div>
      <div class="opt-row">
        <span class="lbl" data-l="optPoll">Threshold check interval (sec)</span>
        <input type="number" data-opt="pollIntervalSec" data-p="claude" min="300" max="3600" />
      </div>
      <div class="opt-row">
        <button data-testcli="claude" data-l="optTestCli">Test CLI restart (no account change)</button>
      </div>
    </div>

    <div class="msg" id="msg"></div>
    <div id="loginBox" style="display:none;background:#1e2026;border:1px solid #10a37f44;border-radius:10px;padding:10px 12px;margin-bottom:12px;">
      <div id="loginPrompt" style="font-size:12px;color:#e8e9ec;margin-bottom:6px;">Browser didn't open? Finish login here:</div>
      <button class="primary" id="openLogin">Open login page</button>
    </div>

    <div class="cols">
      <div class="col" data-prov="codex">
        <div class="colhead"><span class="cdot codex"></span>Codex</div>
        <div class="list" id="list-codex"></div>
      </div>
      <div class="col" data-prov="claude">
        <div class="colhead"><span class="cdot claude"></span>Claude</div>
        <div class="list" id="list-claude"></div>
      </div>
    </div>
    </div>

        $("optCliCodexLabel").textContent = M.optCliCodex;
        $("optCliClaudeLabel").textContent = M.optCliClaude;
        $("optLoginStartLabel").textContent = M.optLoginStart;
        $("optLangLabel").textContent = M.optLang;
        $("optLang").querySelector('option[value=""]').textContent = M.optLangSystem;
        $("loginPrompt").textContent = M.loginPrompt;
        $("openLogin").textContent = M.openLogin;
        document.querySelectorAll("[data-l]").forEach((el) => {
          el.textContent = M[el.dataset.l] || el.textContent;
        });
      }

      const esc = (s) => (s || "").replace(/[&<>"]/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

      const planLabel = (prov, p) => {
        const k = (p || "").toLowerCase();
        if (k === "max" || k === "max20x" || k === "max_20x") return "Max 20x";
        if (k === "max5x" || k === "max_5x") return "Max 5x";
        if (prov === "codex") {
          // Codex plan_type values have non-obvious display names.
          if (k === "prolite") return "Pro 5x";
          if (k === "pro") return "Pro 10x";
        }
        if (k === "pro") return "Pro";
        if (k === "plus") return "Plus";
        if (k === "free") return "Free";
        return p
          ? p.replace(/[_-]+/g, " ").replace(/\b\w/g, (m) => m.toUpperCase())
          : "";
      };

      function fmtReset(resetsAt) {
        if (!resetsAt) return "";
        const mins = Math.max(0, Math.round((resetsAt - Date.now()) / 60000));
        const h = Math.floor(mins / 60), m = mins % 60;
        const rel =
          h >= 48
            ? `${Math.floor(h / 24)}d ${h % 24}h`
            : h > 0
            ? `${h}h ${m}m`
            : `${m}m`;
        return fmt(M.resetsIn, { rel });
      }

      const usedPct = (w) => Math.max(0, Math.min(100, Math.round(w.usedPercent || 0)));
      const gaugeTone = (n) => (n >= 90 ? "red" : n >= 70 ? "amber" : "green");

      function usageRow(label, w) {
        const used = usedPct(w);
        return `<div class="usage-row" data-tone="${gaugeTone(used)}">
          <div class="usage-row-head">
            <span class="usage-label">${label}</span>
            <span class="usage-pct">${fmt(M.usedPct, { n: used })}</span>
          </div>
          <div class="gauge"><span class="gauge-fill" style="width:${used}%"></span></div>
          <div class="usage-reset">${fmtReset(w.resetsAt)}</div>
        </div>`;
      }

      function renameRow(prov, name) {
        return `<div class="rename-row" data-for="${esc(prov)}:${esc(name)}" style="display:none;gap:8px;margin-top:8px;">
          <input data-rename-input="${esc(prov)}:${esc(name)}" value="${esc(name)}"
            style="flex:1;background:#16171b;border:1px solid #2c2f38;color:#e8e9ec;border-radius:8px;padding:7px 10px;font-size:12px;" />
          <button class="primary" data-act="rename-save" data-p="${esc(prov)}" data-n="${esc(name)}">${M.save}</button>
        </div>`;
      }

      // Free plans report a single monthly window instead of the 5h session.
      function primaryLabel(w) {
        const mins = w && w.windowMinutes;
        if (mins && mins >= 60 * 24 * 28) return M.usageMonthly;
        return M.usagePrimary;
      }

      function usageRows(prov, usage) {
        if (!usage) return "";
        const rows = [
          [primaryLabel(usage.primary), usage.primary],
          [M.usageWeeklyAll, usage.secondary],
        ];
        if (prov === "claude" && Object.prototype.hasOwnProperty.call(usage, "fable")) {
          rows.push([M.usageFable, usage.fable]);
        }
        // Render whatever windows the plan actually has (free = monthly only);
        // the unavailable message is reserved for no usage data at all.
        const present = rows.filter((row) => row[1]);
        if (present.length === 0) return "";
        return `<div class="usage-stack">${present.map((row) => usageRow(row[0], row[1])).join("")}</div>`;
      }

      function header(prov, a) {
        const plan = a.usage && a.usage.planType ? planLabel(prov, a.usage.planType) : "";
        const fallbackLabel = a.email
          ? (a.label || "").split(" · ").filter((x) => x !== a.email).join(" · ")
          : (a.label || "");
        const email = a.email || (a.usage && a.usage.email) || fallbackLabel;
        const displayName = a.name;
        const active = a.active ? `<span class="active-badge">${M.activeBadge}</span>` : "";
        const badge = plan ? `<span class="plan-badge">${esc(plan)}</span>` : "";
        const sub = email && email !== a.name ? email : "";
        const emailLine = sub ? `<div class="acct-email">${esc(sub)}</div>` : "";
        return `<div class="acct-head">
          <div class="name-row">
            <div class="acct-name">${esc(displayName)}</div>
            ${active}
            ${badge}
          </div>
          ${emailLine}
        </div>`;
      }

      function renderCard(prov, a) {
        const rows = usageRows(prov, a.usage) || `<div class="usage-none">${M.usageNone}</div>`;
        const switchButton = a.active
          ? ""
          : `<button class="switch-btn" data-act="switch" data-p="${esc(prov)}" data-n="${esc(a.name)}">${M.switchTo}</button>`;
        return `<div class="acct ${a.active ? "active" : ""}">
          ${header(prov, a)}
          ${rows}
          <div class="row-actions">
            ${switchButton}
            <span class="mini-actions">
              <button data-act="rename" data-p="${esc(prov)}" data-n="${esc(a.name)}">${M.rename}</button>
              <button class="ghost" data-act="remove" data-p="${esc(prov)}" data-n="${esc(a.name)}">${M.remove}</button>
            </span>
          </div>
          ${renameRow(prov, a.name)}
        </div>`;
      }

      function renderCol(prov, accounts) {
        const list = $("list-" + prov);
        if (!list) return;
        const head = list.parentElement.querySelector(".colhead");
        const provider = (provInfo(prov).displayName || prov).toUpperCase();
        const active = accounts.find((a) => a.active);
        if (head) {
          head.innerHTML = `<span class="section-title">${fmt(M.providerTitle, { p: esc(provider) })}</span>
            <span class="section-summary">${fmt(M.accountSummary, {
              n: accounts.length,
              active: esc(active ? active.email || active.name : M.noActive),
            })}</span>`;
        }
        if (!accounts.length) {
          list.innerHTML = `<div class="empty">${M.empty}</div>`;
          return;
        }
        // Live account first, then the rest.
        const ordered = [...accounts].sort((a, b) => (b.active ? 1 : 0) - (a.active ? 1 : 0));
        list.innerHTML = ordered
          .map((a) => renderCard(prov, a))
          .join("");
      }

      // Sequence token: a slow in-flight list() must never overwrite a newer render.
      let refreshSeq = 0;
      async function refresh() {
        const seq = ++refreshSeq;
        try {
          const lang = await window.rotator.getLang().catch(() => "en");
          M = DICTS[lang] || DICTS.en;
          if (provList.length === 0) provList = await window.rotator.providers();
          applyStatic();
          await Promise.all(
            provList.map(async (p) => {
              const accounts = await window.rotator.list(p.id).catch(() => []);
              if (seq !== refreshSeq) return; // stale response
              renderCol(p.id, accounts);
            })
          );
        } catch (e) {
          if (seq === refreshSeq) msg(M.loadFailed + e);
        }
      }

      document.querySelector(".cols").addEventListener("click", async (e) => {
        const btn = e.target.closest("button");
        if (!btn) return;
        const name = btn.dataset.n, act = btn.dataset.act, prov = btn.dataset.p;
        if (!act) return;
        if (act === "switch") { msg(M.switching); await window.rotator.switchTo(prov, name); msg(""); refresh(); }
        else if (act === "remove") { await window.rotator.remove(prov, name); refresh(); }
        else if (act === "rename") {
          const row = document.querySelector(`.rename-row[data-for="${CSS.escape(prov + ":" + name)}"]`);
          if (row) {
            row.style.display = "flex";
            row.querySelector("input").focus();
          }
        }
        else if (act === "rename-save") {
          const input = document.querySelector(`input[data-rename-input="${CSS.escape(prov + ":" + name)}"]`);
          const nn = (input?.value || "").trim();
          if (!nn || nn === name) { refresh(); return; }
          const res = await window.rotator.rename(prov, name, nn);
          msg(res.ok ? "" : res.error);
          refresh();
        }
      });

      document.querySelector(".cols").addEventListener("keydown", async (e) => {
        if (e.key !== "Enter") return;
        const input = e.target.closest("input[data-rename-input]");
        if (!input) return;
        const [prov, name] = input.dataset.renameInput.split(/:(.+)/);
        const nn = input.value.trim();
        if (!nn || nn === name) { refresh(); return; }
        const res = await window.rotator.rename(prov, name, nn);
        msg(res.ok ? "" : res.error);
        refresh();
      });

      async function addAccount(prov) {
        const info = provInfo(prov);
        const btn = prov === "codex" ? $("addCodex") : $("addClaude");
        btn.disabled = true;
        let res;
        if (info.hasLoginFlow) {
          msg(fmt(M.opening, { p: info.displayName || prov }));
          res = await window.rotator.addViaLogin(prov);
        } else {
          // No headless login flow (Claude): enroll whatever the CLI is
          // currently logged into.
          res = await window.rotator.importCurrent(prov);
        }
        btn.disabled = false;
        $("loginBox").style.display = "none";
        msg(res.ok
          ? fmt(M.added, { n: res.email || res.name })
          : (M.loginFailed + res.error));
        refresh();
      }
      $("addCodex").addEventListener("click", () => addAccount("codex"));
      $("addClaude").addEventListener("click", () => addAccount("claude"));

      // ------- Options panel -------
      async function loadOptions() {
        const cfg = await window.rotator.getConfig();
        $("optAuto").checked = !!cfg.codex.autoApprove;
        $("optCliCodex").checked = !!cfg.codex.autoRestartCli;
        $("optCliClaude").checked = !!cfg.claude.autoRestartCli;
        $("optLoginStart").checked = !!cfg.launchAtLogin;
        $("optLang").value = cfg.language || "";
        document.querySelectorAll("input[data-opt]").forEach((el) => {
          const pc = cfg[el.dataset.p] || {};
          el.value = pc[el.dataset.opt];
        });
      }
      $("optBtn").addEventListener("click", async () => {
        const p = $("optPanel");
        if (p.style.display === "none" || !p.style.display) {
          await loadOptions();
          p.style.display = "block";
        } else p.style.display = "none";
      });
      $("optAuto").addEventListener("change", () =>
        window.rotator.setConfig({ codex: { autoApprove: $("optAuto").checked } }));
      $("optCliCodex").addEventListener("change", () =>
        window.rotator.setConfig({ codex: { autoRestartCli: $("optCliCodex").checked } }));
      $("optCliClaude").addEventListener("change", () =>
        window.rotator.setConfig({ claude: { autoRestartCli: $("optCliClaude").checked } }));
      $("optLoginStart").addEventListener("change", () =>
        window.rotator.setConfig({ launchAtLogin: $("optLoginStart").checked }));
      $("optLang").addEventListener("change", async () => {
        await window.rotator.setConfig({ language: $("optLang").value });
        refresh(); // re-render in the new language
      });
      document.querySelectorAll("input[data-opt]").forEach((el) => {
        el.addEventListener("change", () => {
          const min = parseInt(el.min, 10), max = parseInt(el.max, 10);
          const v = Math.min(max, Math.max(min, parseInt(el.value, 10) || min));
          el.value = v;
          window.rotator.setConfig({ [el.dataset.p]: { [el.dataset.opt]: v } });
        });
      });

      document.querySelectorAll("button[data-testcli]").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const prov = btn.dataset.testcli;
          btn.disabled = true;
          msg(M.testCliRun);
          try {
            const res = await window.rotator.testCliRestart(prov);
            msg(res.sessions === 0
              ? fmt(M.testCliNone, { p: provInfo(prov).displayName || prov })
              : res.result
                ? fmt(M.testCliDone, {
                    inPlace: res.result.resumedInPlace,
                    restarted: res.result.restarted,
                    manual: res.result.manual,
                    failed: res.result.failed,
                  })
                : M.testCliDeferred);
          } catch (e) {
            msg(M.loadFailed + e);
          }
          btn.disabled = false;
        });
      });

      let loginUrl = null;
      window.rotator.onLoginUrl((url) => {
        loginUrl = url;
        $("loginBox").style.display = "block";
      });
      $("openLogin").addEventListener("click", () => {
        if (loginUrl) window.rotator.openUrl(loginUrl);
      });

      $("tbClose").addEventListener("click", () => window.rotator.closeManager());

      window.rotator.onChanged(() => refresh());
      refresh();
      setInterval(refresh, 15000);
    </script>
  </body>
</html>
