<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'"
    />
    <style>
      :root {
        --card: #1e2026;
        --line: #2c2f38;
        --text: #e8e9ec;
        --muted: #9aa0ac;
        --accent: #10a37f;
        --accent-hi: #14c493;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        color: var(--text);
        user-select: none;
      }
      .card {
        width: 100vw;
        max-height: 160px;
        padding: 14px 14px 15px 16px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background:
          linear-gradient(135deg, #252832 0%, var(--card) 42%, #181a20 100%);
        box-shadow: 0 18px 40px #0008, 0 0 0 1px #ffffff08 inset;
        cursor: default;
      }
      .head {
        display: flex;
        align-items: flex-start;
        gap: 10px;
      }
      .dot {
        width: 9px;
        height: 9px;
        margin-top: 5px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 12px var(--accent-hi);
        flex-shrink: 0;
      }
      .content {
        min-width: 0;
        flex: 1;
      }
      .title {
        font-size: 13px;
        line-height: 1.35;
        font-weight: 700;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .body {
        margin-top: 5px;
        max-height: 96px;
        overflow: hidden;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.42;
        overflow-wrap: anywhere;
        white-space: pre-wrap;
      }
      .close {
        width: 23px;
        height: 23px;
        border: 1px solid #ffffff0f;
        border-radius: 8px;
        background: transparent;
        color: #aeb3bd;
        font-size: 17px;
        line-height: 18px;
        cursor: pointer;
        -webkit-app-region: no-drag;
      }
      .close:hover {
        background: #2a2d36;
        color: var(--text);
      }
    </style>
  </head>
  <body>
    <div class="card" id="card">
      <div class="head">
        <span class="dot"></span>
        <div class="content">
          <div class="title" id="title"></div>
          <div class="body" id="body"></div>
        </div>
        <button class="close" id="close" aria-label="Close">×</button>
      </div>
    </div>

    <script>
      const AUTO_DISMISS_MS = 6000;
      let dismissed = false;
      let remainingMs = AUTO_DISMISS_MS;
      let timerStartedAt = 0;
      let timer = null;

      function dismiss() {
        if (dismissed) return;
        dismissed = true;
        window.rotator.appNotifyDismiss();
      }

      function startTimer() {
        window.clearTimeout(timer);
        timerStartedAt = Date.now();
        timer = window.setTimeout(dismiss, remainingMs);
      }

      function pauseTimer() {
        if (timer === null) return;
        window.clearTimeout(timer);
        timer = null;
        remainingMs = Math.max(0, remainingMs - (Date.now() - timerStartedAt));
      }

      function resumeTimer() {
        if (timer !== null || dismissed) return;
        if (remainingMs <= 0) dismiss();
        else startTimer();
      }

      function reportHeight() {
        const card = document.getElementById("card");
        window.rotator.appNotifyResize(card.scrollHeight);
      }

      async function init() {
        const payload = await window.rotator.appNotifyPayload();
        if (!payload) {
          dismiss();
          return;
        }

        document.title = payload.title || "LazySwitch";
        document.getElementById("title").textContent = payload.title || "";
        document.getElementById("body").textContent = payload.body || "";

        const card = document.getElementById("card");
        new ResizeObserver(reportHeight).observe(card);
        window.requestAnimationFrame(reportHeight);
        startTimer();
      }

      document.body.addEventListener("mouseenter", pauseTimer);
      document.body.addEventListener("mouseleave", resumeTimer);
      document.body.addEventListener("click", dismiss);
      document.getElementById("close").addEventListener("click", dismiss);
      init();
    </script>
  </body>
</html>
