name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    # Process/terminal detection logic (Windows Terminal, PowerShell, taskkill,
    # etc.) is Windows-specific, so tests need to run on Windows to be meaningful.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: node --test test/*.test.js
